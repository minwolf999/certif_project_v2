default: &default
  adapter: postgresql
  encoding: unicode
  
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  
  username: postgres
  password: NewStrongPassword1234
  
  host: db
  port: 5432

development:
  <<: *default
  database: log_dev

test:
  <<: *default
  database: log_test

production:
  <<: *default
  database: log_prod
